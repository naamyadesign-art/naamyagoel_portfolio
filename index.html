<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Naamya Goel | Portfolio Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,500;1,700&family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="https://i.ibb.co/5hbtkfX0/Whats-App-Image-2026-01-28-at-11-56-33-AM.jpg" fetchpriority="high">
  <link rel="preload" as="image" href="https://i.ibb.co/JjbnNJTL/photoboothbynaamya-vercel-app.png" fetchpriority="high">
  <style>
    :root {
      --bg-color: #050505;
      --accent-red: #8A1800;
    }
    
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background-color: #050505;
      font-family: 'Space Grotesk', sans-serif;
      color: white;
      scroll-behavior: smooth;
      width: 100%;
    }

    .font-serif-elegant { font-family: 'Cormorant Garamond', serif; font-weight: 700; }
    .font-inter-black { font-family: 'Inter', sans-serif; font-weight: 900; }
    
    #root {
      width: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .game-grid {
      background-image: 
        linear-gradient(rgba(138, 24, 0, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138, 24, 0, 0.2) 1px, transparent 1px),
        linear-gradient(rgba(138, 24, 0, 0.1) 0.5px, transparent 0.5px),
        linear-gradient(90deg, rgba(138, 24, 0, 0.1) 0.5px, transparent 0.5px);
      background-size: 30px 30px, 30px 30px, 10px 10px, 10px 10px;
      background-attachment: fixed;
    }

    .red-grid {
      background-image: 
        linear-gradient(rgba(138, 24, 0, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138, 24, 0, 0.2) 1px, transparent 1px),
        linear-gradient(rgba(138, 24, 0, 0.1) 0.5px, transparent 0.5px),
        linear-gradient(90deg, rgba(138, 24, 0, 0.1) 0.5px, transparent 0.5px);
      background-size: 30px 30px, 30px 30px, 10px 10px, 10px 10px;
      background-attachment: fixed;
    }

    .catalogue-grid {
      background-image: 
        linear-gradient(rgba(0, 71, 79, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 71, 79, 0.1) 1px, transparent 1px),
        linear-gradient(rgba(0, 71, 79, 0.03) 0.5px, transparent 0.5px),
        linear-gradient(90deg, rgba(0, 71, 79, 0.03) 0.5px, transparent 0.5px);
      background-size: 30px 30px, 30px 30px, 10px 10px, 10px 10px;
      background-attachment: fixed;
    }

    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .f-italic {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      display: inline-block;
      transform: translateX(0.04em);
      margin-right: 0.02em;
    }

    @keyframes bounce-hand {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(12px); }
    }
    .animate-hand {
      animation: bounce-hand 1.5s ease-in-out infinite;
    }

    @keyframes bounce-subtle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }
    .animate-bounce-subtle {
      animation: bounce-subtle 2s ease-in-out infinite;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--accent-red);
      border-radius: 10px;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

  </style>
</head>
<body class="bg-[#050505] red-grid">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
